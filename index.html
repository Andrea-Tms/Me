<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's fall in love again ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:white;
text-align:center;
}

.container{
z-index:2;
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
font-size:18px;
margin-bottom:25px;
}

img{
width:220px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

button{
background:white;
color:#ff4f81;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:30px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
margin-top:20px;
flex-wrap:wrap;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Hi sweetie 🥰</h1>

<img src="foto.jpg" alt="Us">

<p>
I wish you could see yourself the way I see you, then you’d understand how much I’ve loved you through the years
</p>

<div class="buttons">

<button onclick="playSong()">Click me 🫂</button>

<button onclick="openNotes()">Read me 💌</button>

</div>

</div>

<script>

function playSong(){
window.location.href="https://open.spotify.com/track/50x1Ic8CaXkYNvjmxe3WXy?si=P5nrN5VtQLegmSp3mSjlmw";
}

function openNotes(){
window.location.href="note.html";
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
heart.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
